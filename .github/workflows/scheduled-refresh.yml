name: 定时发布 A股指标网页

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # GitHub Actions 使用 UTC；北京时间 08:45/09:15 分别对应 UTC 00:45/01:15。
    - cron: "45 0 * * *"
    - cron: "15 1 * * *"

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: 构建并发布静态看板
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 恢复数据缓存
        uses: actions/cache@v4
        with:
          path: .cache
          key: ashare-data-cache-${{ github.run_id }}
          restore-keys: |
            ashare-data-cache-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: 运行测试
        env:
          PYTHONIOENCODING: utf-8
        run: python -m pytest

      - name: 生成网页快照
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/build_static_site.py --output dist

      - name: 发布到 gh-pages 分支
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add gh-pages-worktree gh-pages
          else
            git worktree add --detach gh-pages-worktree
            git -C gh-pages-worktree checkout --orphan gh-pages
          fi

          find gh-pages-worktree -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a dist/. gh-pages-worktree/
          git -C gh-pages-worktree add -A

          if [ -n "$(git -C gh-pages-worktree status --porcelain)" ]; then
            git -C gh-pages-worktree commit -m "deploy: 更新A股指标网页快照"
            git -C gh-pages-worktree push origin gh-pages
          else
            echo "静态网页无变化，跳过发布提交。"
          fi
